bc: catalog
version: "1.0.0"

aggregates:
  - name: Product
    root: Product
    auditable: false
    properties:
      - name: id
        type: Uuid
        readOnly: true
        defaultValue: generated
      - name: name
        type: String(200)

useCases:
  - id: get-order-summary
    name: GetOrderSummary
    type: query
    aggregate: Product
    trigger:
      kind: http
      operationId: getOrderSummary
    input:
      - name: orderId
        type: Uuid
        source: path
        required: true
    returns: OrderSummaryResultDto
    implementation: scaffold

integrations:
  inbound:
    - operations:
        - name: getOrderSummary
