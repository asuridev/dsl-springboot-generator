# ─── Test scenario: auth-oauth2-cc ────────────────────────────────────────────
# Covers:
#   - auth.type: oauth2-cc on externalSystem (credentialKey + tokenEndpoint)
#   - AuthServiceRestConfig.java injects OAuth2ClientCredentialsSupport
#   - OAuth2ClientCredentialsSupport.java is generated once in shared/
#   - parameters/{env}/oauth2.yaml is generated with registration block
#   - application-{env}.yaml imports oauth2.yaml
#   - build.gradle includes spring-boot-starter-oauth2-client
# ──────────────────────────────────────────────────────────────────────────────

system:
  name: test-auth-system
  description: Minimal system to test oauth2-cc auth on an external system.
  domainType: core

boundedContexts:
  - name: payments
    type: core
    purpose: Handles payment operations via token-secured billing API.
    aggregates:
      - name: Payment
        root: Payment
        entities: []

externalSystems:

  - name: auth-service
    description: Token-secured billing API using OAuth2 client credentials.
    type: billing
    auth:
      type: oauth2-cc
      credentialKey: billing-provider
      tokenEndpoint: https://auth.billing.example.com/oauth/token
    operations:
      - name: createInvoice
        method: POST
        path: /v1/invoices

integrations:
  - from: payments
    to: auth-service
    pattern: acl
    channel: http
    contracts:
      - createInvoice

infrastructure:
  database:
    type: relational
    isolationStrategy: schema-per-bc
