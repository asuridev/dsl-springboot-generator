openapi: "3.0.3"
info:
  title: Item API
  version: "1.0.0"
paths:
  /items/{itemId}/price:
    post:
      operationId: calculateItemPrice
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The calculated price.
          content:
            application/json:
              schema:
                type: string
