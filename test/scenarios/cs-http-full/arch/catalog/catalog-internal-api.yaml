openapi: "3.0.3"
info:
  title: Catalog Internal API
  version: "1.0.0"
  description: >
    Internal contract for BC-to-BC calls.
    Consumed by orders BC via customer-supplier pattern.
paths:

  /internal/products/validate:
    post:
      operationId: validateProductsAndPrices
      summary: Validate a product and its price.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateProductsRequest'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateProductsResult'

  /internal/products/{productId}:
    get:
      operationId: getProductById
      summary: Retrieve a product by its ID.
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetails'

components:
  schemas:

    ValidateProductsRequest:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        quantity:
          type: integer

    ValidateProductsResult:
      type: object
      properties:
        valid:
          type: boolean
        unitPrice:
          type: number

    ProductDetails:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        name:
          type: string
        price:
          type: number
