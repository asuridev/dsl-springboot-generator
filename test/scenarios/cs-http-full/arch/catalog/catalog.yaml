bc: catalog
version: "1.0.0"

aggregates:
  - name: Product
    root: Product
    auditable: false
    properties:
      - name: id
        type: Uuid
        readOnly: true
        defaultValue: generated
      - name: name
        type: String(200)
      - name: price
        type: Decimal
        precision: 10
        scale: 2
    domainMethods:
      - name: validate
        params:
          - name: productId
            type: Uuid
      - name: getById
        params:
          - name: productId
            type: Uuid

useCases:
  - id: validate-products-and-prices
    name: ValidateProductsAndPrices
    type: command
    aggregate: Product
    trigger:
      kind: http
      operationId: validateProductsAndPrices
    method: validate
    input:
      - name: productId
        type: Uuid
        source: body
        required: true
      - name: quantity
        type: Integer
        source: body
        required: true
    implementation: scaffold

  - id: get-product-by-id
    name: GetProductById
    type: query
    aggregate: Product
    returns: Product
    trigger:
      kind: http
      operationId: getProductById
    input:
      - name: productId
        type: Uuid
        source: path
        required: true
    method: getById
    implementation: scaffold

integrations:
  inbound:
    - operations:
        - name: validateProductsAndPrices
        - name: getProductById
