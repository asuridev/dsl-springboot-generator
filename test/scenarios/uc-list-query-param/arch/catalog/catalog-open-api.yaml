openapi: "3.0.3"
info:
  title: Catalog API
  version: "1.0.0"
paths:
  /products/by-ids:
    get:
      operationId: findProductsByIds
      summary: Find products by a set of ids.
      parameters:
        - name: productIds
          in: query
          required: true
          description: Product ids to fetch (repeated query param).
          schema:
            type: array
            items:
              type: string
              format: uuid
      responses:
        "200":
          description: List of products.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductResponseDto'

components:
  schemas:
    ProductResponseDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
