openapi: "3.0.3"
info:
  title: Order API
  version: "1.0.0"
  description: API for order management — single-arg parameterized errors scenario.
paths:
  /orders/{orderId}:
    get:
      operationId: getOrder
      summary: Get order by ID.
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The order.
          content:
            application/json:
              schema:
                type: object

  /orders/by-reference/{reference}:
    get:
      operationId: getOrderByRef
      summary: Get order by reference number.
      parameters:
        - name: reference
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The order.
          content:
            application/json:
              schema:
                type: object
