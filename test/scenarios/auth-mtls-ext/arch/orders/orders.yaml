bc: orders
version: "1.0.0"

aggregates:
  - name: Order
    root: Order
    auditable: false
    properties:
      - name: id
        type: Uuid
        readOnly: true
        defaultValue: generated
      - name: status
        type: String(50)

integrations:
  outbound:
    - name: internal-ledger
      type: externalSystem
      protocol: http
      operations:
        - name: getBalance
