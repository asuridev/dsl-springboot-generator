openapi: "3.0.3"
info:
  title: Catalog API
  version: "1.0.0"
paths:
  /products:
    post:
      operationId: createCatalogProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Product created.
