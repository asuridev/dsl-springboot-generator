openapi: "3.0.3"
info:
  title: Catalog API
  version: "1.0.0"
paths:
  /products/{productId}/activate:
    post:
      operationId: activateProduct
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Product activated.
  /products/{productId}/discontinue:
    post:
      operationId: discontinueProduct
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Product discontinued.
