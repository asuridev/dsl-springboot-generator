openapi: "3.0.3"
info:
  title: Catalog API
  version: "1.0.0"
paths:
  /categories/{categoryId}/archive:
    post:
      operationId: archiveCategory
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Category archived.
