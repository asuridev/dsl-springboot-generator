openapi: "3.0.3"
info:
  title: Catalog API
  version: "1.0.0"
paths:
  /categories:
    post:
      operationId: createCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
      responses:
        "201":
          description: Category created.
  /categories/{categoryId}:
    patch:
      operationId: updateCategory
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        "204":
          description: Category updated.
