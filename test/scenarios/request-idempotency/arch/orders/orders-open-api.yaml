openapi: "3.0.3"
info:
  title: Orders API
  version: "1.0.0"
  description: API for order management — request idempotency scenario.
paths:
  /orders:
    post:
      operationId: placeOrder
      summary: Place a new order (idempotent).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customerId:
                  type: string
                  format: uuid
      responses:
        "201":
          description: Order placed.
        "409":
          description: Concurrent duplicate request — try again shortly.
