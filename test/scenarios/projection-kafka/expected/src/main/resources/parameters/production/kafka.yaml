spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: test-projection-kafka-system-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      ack-mode: manual_immediate

topics:
  product-activated: catalog.product-activated
  product-price-changed: catalog.product-price-changed
  orders-projection-local-product-view-product-activated: catalog.product-activated
  orders-projection-local-product-view-product-price-changed: catalog.product-price-changed


