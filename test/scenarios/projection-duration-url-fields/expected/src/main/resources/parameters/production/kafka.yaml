spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: test-duration-url-system-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      ack-mode: manual_immediate

topics:
  dashboard-projection-service-metrics-service-check-completed: monitoring.service.check.completed
  dashboard-projection-service-metrics-service-latency-updated: monitoring.service.latency.updated
  service-check-completed: monitoring.service-check.completed
  service-latency-updated: monitoring.service-check.latency-updated


