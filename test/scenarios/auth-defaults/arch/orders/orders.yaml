bc: orders
version: "1.0.0"

aggregates:
  - name: Order
    root: Order
    auditable: false
    properties:
      - name: id
        type: Uuid
        readOnly: true
        defaultValue: generated
      - name: status
        type: String(50)

integrations:
  outbound:
    - name: catalog
      protocol: http
      operations:
        - name: validateProduct
      # intentionally no auth override — should inherit from system defaults
