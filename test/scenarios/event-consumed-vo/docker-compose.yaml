name: test-consumed-vo-system-cluster
services:
  postgres:
    image: postgres:16-alpine
    container_name: test-consumed-vo-system-postgres
    environment:
      POSTGRES_DB: test_consumed_vo_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - test-consumed-vo-system-network
  rabbitmq:
    image: rabbitmq:4-management
    container_name: test-consumed-vo-system-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    networks:
      - test-consumed-vo-system-network
volumes:
  postgres-data: null
networks:
  test-consumed-vo-system-network:
    driver: bridge
