bc: payments
version: "1.0.0"

aggregates:
  - name: Payment
    root: Payment
    auditable: false
    properties:
      - name: id
        type: Uuid
        readOnly: true
        defaultValue: generated
      - name: orderId
        type: Uuid
    domainMethods:
      - name: process
        params:
          - name: orderId
            type: Uuid

useCases:
  - id: process-payment
    name: ProcessPayment
    type: command
    aggregate: Payment
    trigger:
      kind: event
      event: StockReserved
    method: process

domainEvents:
  consumed:
    - name: StockReserved
      producer: inventory
      command: ProcessPayment
      queueKey: payments-stock-reserved
      payload:
        - name: orderId
          type: Uuid

  published:
    - name: PaymentApproved
      scope: integration
      channel: payments.payment.approved
      payload:
        - name: orderId
          type: Uuid
          source: aggregate
          field: orderId
    - name: PaymentFailed
      scope: integration
      channel: payments.payment.failed
      payload:
        - name: orderId
          type: Uuid
          source: aggregate
          field: orderId
