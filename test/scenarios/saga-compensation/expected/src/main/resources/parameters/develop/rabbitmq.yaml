spring:
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: 3
        prefetch: 5
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1500
          multiplier: 2.0
          max-interval: 30000
          stateless: true

exchanges:
  inventory: inventory.events
  orders: orders.events
  payments: payments.events



queues:
  inventory-order-placed: inventory.order-placed
  inventory-payment-failed: inventory.payment-failed
  payments-stock-reserved: payments.stock-reserved



routing-keys:
  stock-reserved: inventory.stock.reserved
  stock-reservation-failed: inventory.stock.reservation-failed
  stock-released: inventory.stock.released
  inventory-order-placed: order.placed
  inventory-payment-failed: payment.failed
  order-placed: orders.order.placed
  payment-approved: payments.payment.approved
  payment-failed: payments.payment.failed
  payments-stock-reserved: stock.reserved


