spring:
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: 1
        prefetch: 1
        retry:
          enabled: true
          max-attempts: 2
          initial-interval: 500
          multiplier: 1.0
          max-interval: 1000
          stateless: true

exchanges:
  warehouse: warehouse.events



queues:
  notifications-shipment-dispatched: notifications.shipment-dispatched



routing-keys:
  notifications-shipment-dispatched: warehouse.shipment.dispatched
  shipment-dispatched: warehouse.shipment.dispatched


