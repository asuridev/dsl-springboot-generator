openapi: "3.0.3"
info:
  title: Catalog API
  version: "1.0.0"
paths:
  /products/{productId}:
    get:
      operationId: getProductById
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Product detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetail"
components:
  schemas:
    ProductDetail:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        price:
          $ref: "#/components/schemas/Money"
