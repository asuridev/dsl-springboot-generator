openapi: "3.0.3"
info:
  title: Payment API
  version: "1.0.0"
  description: API for payment management — chainable error scenario.
paths:
  /payments:
    post:
      operationId: processPayment
      summary: Process a payment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
      responses:
        "200":
          description: The UUID of the created payment.
          content:
            application/json:
              schema:
                type: string
                format: uuid
