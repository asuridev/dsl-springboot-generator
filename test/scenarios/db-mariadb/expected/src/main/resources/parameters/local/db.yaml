spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/test_event_system
    username: postgres
    password: postgres
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

logging:
  level:
    root: INFO
    com.test: DEBUG
