spring:
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/test_event_system}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MariaDBDialect

logging:
  level:
    root: INFO
    com.test: DEBUG
