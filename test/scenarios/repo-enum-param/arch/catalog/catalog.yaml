bc: catalog
version: "1.0.0"

enums:
  - name: Category
    description: Product category — non-conventional name (does NOT end in Status/Type/State).
    values:
      - value: ELECTRONICS
        description: Electronic products.
      - value: CLOTHING
        description: Clothing products.
      - value: FOOD
        description: Food products.

aggregates:
  - name: Product
    root: Product
    auditable: false
    properties:
      - name: id
        type: Uuid
        readOnly: true
        defaultValue: generated
      - name: name
        type: String(200)
        required: true
      - name: category
        type: Category
        required: true

useCases:
  - id: UC-CAT-001
    name: FindProductsByCategory
    type: query
    actor: user
    trigger:
      kind: http
      operationId: findProductsByCategory
    aggregate: Product
    input:
      - name: category
        type: Category
        source: query
        required: true
    returns: List[Product]
    implementation: scaffold

errors:
  - code: PRODUCT_NOT_FOUND
    httpStatus: 404
    description: Product not found.
    usedFor: manual

repositories:
  - aggregate: Product
    methods:
      - name: findById
        signature: "findById(Uuid): Product?"
      - name: save
        signature: "save(Product): Product"
    queryMethods:
      - name: findByCategory
        params:
          - name: category
            type: Category
            required: true
            filterOn: [category]
            operator: EQ
        returns: List[Product]
