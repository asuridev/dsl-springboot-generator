spring:
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: 3
        prefetch: 5
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1500
          multiplier: 2.0
          max-interval: 30000
          stateless: true

exchanges:
  calendar: calendar.events



queues:
  booking-projection-daily-capacity-slot-capacity-published: booking.booking-projection-daily-capacity-slot-capacity-published



routing-keys:
  booking-projection-daily-capacity-slot-capacity-published: slot.capacity.published
  slot-capacity-published: calendar.slot.capacity-published


