openapi: "3.0.3"
info:
  title: Orders Internal API
  version: "1.0.0"
paths:

  /internal/orders/{orderId}:
    get:
      operationId: getOrderDetails
      summary: Get order details including all line items.
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order details with line items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetailsResult'

components:
  schemas:

    OrderDetailsResult:
      type: object
      properties:
        orderId:
          type: string
          format: uuid
        totalAmount:
          type: number
        lineItems:
          type: array
          items:
            $ref: '#/components/schemas/OrderLineItem'

    OrderLineItem:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        quantity:
          type: integer
        unitPrice:
          type: number
