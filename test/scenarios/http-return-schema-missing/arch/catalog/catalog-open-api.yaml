openapi: "3.0.3"
info:
  title: Catalog API
  version: "1.0.0"
paths:
  /products/{productId}:
    get:
      operationId: getProductById
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Product found.
