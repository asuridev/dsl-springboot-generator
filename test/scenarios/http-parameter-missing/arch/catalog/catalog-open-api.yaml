openapi: "3.0.3"
info:
  title: Catalog API
  version: "1.0.0"
paths:
  /products/{productId}:
    get:
      operationId: getProductById
      responses:
        "200":
          description: Product found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetail"
components:
  schemas:
    ProductDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
