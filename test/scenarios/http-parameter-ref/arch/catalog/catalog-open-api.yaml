openapi: "3.0.3"
info:
  title: Catalog API
  version: "1.0.0"
paths:
  /products/{productId}:
    parameters:
      - $ref: "#/components/parameters/ProductIdPath"
    get:
      operationId: getProductById
      responses:
        "200":
          description: Product found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetail"
components:
  parameters:
    ProductIdPath:
      name: productId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    ProductDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
