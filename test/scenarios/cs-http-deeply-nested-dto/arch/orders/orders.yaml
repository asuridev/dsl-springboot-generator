bc: orders
version: "1.0.0"

aggregates:
  - name: Order
    root: Order
    auditable: false
    properties:
      - name: id
        type: Uuid
        readOnly: true
        defaultValue: generated
      - name: status
        type: String(50)

valueObjects:
  - name: Money
    description: Monetary amount with currency.
    properties:
      - name: amount
        type: Decimal
        precision: 19
        scale: 4
        required: true
      - name: currency
        type: String(3)
        required: true

integrations:
  outbound:
    - name: catalog
      protocol: http
      operations:
        - name: validateProductPrices
