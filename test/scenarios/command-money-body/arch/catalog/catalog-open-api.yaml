openapi: "3.0.3"
info:
  title: Catalog API
  version: "1.0.0"
paths:
  /products:
    post:
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        "201":
          description: Product created.
          content:
            application/json:
              schema:
                type: string
                format: uuid
  /products/{productId}/price:
    patch:
      operationId: updateProductPrice
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePriceRequest'
      responses:
        "204":
          description: Price updated.
components:
  schemas:
    MoneyRequest:
      type: object
      properties:
        amount:
          type: number
        currency:
          type: string
    CreateProductRequest:
      type: object
      properties:
        name:
          type: string
        price:
          $ref: '#/components/schemas/MoneyRequest'
    UpdatePriceRequest:
      type: object
      properties:
        price:
          $ref: '#/components/schemas/MoneyRequest'
