openapi: "3.0.3"
info:
  title: Catalog API
  version: "1.0.0"
paths:
  /products:
    post:
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        "201":
          description: Product created.
          content:
            application/json:
              schema:
                type: string
                format: uuid
components:
  schemas:
    MoneyRequest:
      type: object
      properties:
        amount:
          type: number
        currency:
          type: string
    CreateProductRequest:
      type: object
      properties:
        name:
          type: string
        price:
          $ref: '#/components/schemas/MoneyRequest'
