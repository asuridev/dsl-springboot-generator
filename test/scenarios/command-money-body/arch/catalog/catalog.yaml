bc: catalog
version: "1.0.0"

aggregates:
  - name: Product
    root: Product
    auditable: true
    properties:
      - name: id
        type: Uuid
        readOnly: true
        defaultValue: generated
      - name: name
        type: String(200)
        required: true
      - name: price
        type: Money
        required: true
    domainMethods:
      - name: create
        params:
          - name: name
            type: String
          - name: price
            type: Money
        returns: Product
      - name: updatePrice
        params:
          - name: price
            type: Money
        returns: void

useCases:
  - id: UC-CAT-001
    name: CreateProduct
    type: command
    aggregate: Product
    trigger:
      kind: http
      operationId: createProduct
    method: create
    input:
      - name: name
        type: String
        source: body
        required: true
      - name: price
        type: Money
        source: body
        required: true
    returns: Uuid
    implementation: scaffold

  # implementation: full + Money body input — exercises the handler-body conversion
  # MoneyRequest → Money (`new Money(command.price().amount(), command.price().currency())`).
  - id: UC-CAT-002
    name: UpdateProductPrice
    type: command
    aggregate: Product
    trigger:
      kind: http
      operationId: updateProductPrice
    method: updatePrice
    input:
      - name: productId
        type: Uuid
        source: path
        required: true
        loadAggregate: true
      - name: price
        type: Money
        source: body
        required: true
    notFoundError: PRODUCT_NOT_FOUND
    implementation: full

errors:
  - code: PRODUCT_NOT_FOUND
    httpStatus: 404
    description: Product not found.

repositories:
  - aggregate: Product
    methods:
      - name: findById
        signature: "findById(Uuid): Product?"
      - name: save
        signature: "save(Product): Product"
