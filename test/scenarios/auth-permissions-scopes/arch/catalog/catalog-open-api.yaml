openapi: "3.0.3"
info:
  title: Catalog API
  version: "1.0.0"
  description: Catalog item API with mixed authorization strategies (permissions, scopes, roles).

paths:
  /items/{itemId}:
    get:
      operationId: getItemById
      summary: Get item by ID
      description: Returns item details. Requires permission catalog:read.
      tags:
        - Catalog
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Item found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemDetail'
        '403':
          description: Insufficient permissions.
        '404':
          description: Item not found.

    put:
      operationId: updateItem
      summary: Update a catalog item
      description: Updates catalog item. Requires scope catalog:write AND role MANAGER.
      tags:
        - Catalog
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateItemRequest'
      responses:
        '200':
          description: Item updated.
        '403':
          description: Insufficient permissions.
        '404':
          description: Item not found.

  /items:
    post:
      operationId: createItem
      summary: Create a catalog item
      description: Creates a new catalog item. Requires scope catalog:write.
      tags:
        - Catalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItemRequest'
      responses:
        '201':
          description: Item created.
        '400':
          description: Validation error.
        '403':
          description: Insufficient permissions.

  /items/{itemId}/archive:
    post:
      operationId: archiveItem
      summary: Archive a catalog item
      description: Archives an item. Requires scope catalog:admin AND role ADMIN AND permission catalog:archive.
      tags:
        - Catalog
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Item archived.
        '403':
          description: Insufficient permissions.
        '404':
          description: Item not found.

components:
  schemas:
    CreateItemRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 200

    UpdateItemRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 200

    ItemDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
