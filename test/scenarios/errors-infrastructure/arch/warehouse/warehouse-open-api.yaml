openapi: "3.0.3"
info:
  title: Warehouse API
  version: "1.0.0"
  description: API for warehouse stock management — infrastructure error scenario.
paths:
  /stocks/{stockId}:
    get:
      operationId: getStock
      summary: Get stock by ID.
      parameters:
        - name: stockId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The stock record.
          content:
            application/json:
              schema:
                type: object
