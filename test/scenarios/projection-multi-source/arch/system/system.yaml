system:
  name: test-multi-source-system
  description: System for testing multi-source persistent projections.
  domainType: core

boundedContexts:
  - name: catalog
    type: core
    purpose: Manages products and publishes lifecycle and pricing events.
    aggregates:
      - name: Product
        root: Product
        entities: []

  - name: orders
    type: core
    purpose: Manages orders. Maintains a local read model of products updated from multiple catalog events.
    aggregates:
      - name: Order
        root: Order
        entities: []

integrations:
  - from: catalog
    to: orders
    pattern: event
    channel: message-broker
    contracts:
      - name: ProductActivated
        channel: catalog.product.activated
      - name: ProductPriceChanged
        channel: catalog.product.price.changed

infrastructure:
  messageBroker:
    type: rabbitmq
  database:
    type: relational
    isolationStrategy: schema-per-bc
