system:
  name: uc-multipart-mixed
  description: Test system for mixed multipart/form-data generation — product media upload with typed form fields.
  domainType: core

boundedContexts:
  - name: catalog
    type: core
    purpose: Manages products and their uploaded media (images).
    aggregates:
      - name: Product
        root: Product
        entities:
          - ProductImage

infrastructure:
  database:
    type: relational
    isolationStrategy: schema-per-bc
  objectStorage:
    - name: product-media
      visibility: public
      urlAccess: public-url
      ownedBy: catalog
