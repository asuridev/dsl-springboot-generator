system:
  name: test-resilience-system
  description: Minimal test system for resilience-timeouts-only scenario.
  domainType: core

boundedContexts:
  - name: healthcheck
    type: supporting
    purpose: Monitors external service health.
    aggregates:
      - name: ServiceHealth
        root: ServiceHealth
        entities: []

externalSystems:
  - name: health-api
    description: External health check endpoint.
    type: health-api
    resilience:
      connectTimeoutMs: 2000
      timeoutMs: 8000
    operations:
      - name: checkHealth
        method: GET
        path: /health
        response:
          fields:
            - name: status
              type: String
        domain:
          returnType: HealthStatus
          fields:
            - name: status
              type: String

integrations:
  - from: healthcheck
    to: health-api
    pattern: acl
    channel: http
    contracts:
      - checkHealth

infrastructure:
  database:
    type: relational
    isolationStrategy: schema-per-bc
