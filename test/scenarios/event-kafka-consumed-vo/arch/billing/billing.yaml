bc: billing
version: "1.0.0"

enums:
  - name: OrderStatus
    values:
      - name: DRAFT
      - name: CONFIRMED
      - name: SHIPPED

valueObjects:
  - name: Money
    properties:
      - name: amount
        type: Decimal
        precision: 19
        scale: 4
      - name: currency
        type: String

aggregates:
  - name: Invoice
    root: Invoice
    auditable: false
    properties:
      - name: id
        type: Uuid
        readOnly: true
        defaultValue: generated
      - name: orderId
        type: Uuid
      - name: totalAmount
        type: Money
    domainMethods:
      - name: process
        params:
          - name: orderId
            type: Uuid
          - name: totalAmount
            type: Money
          - name: status
            type: OrderStatus

useCases:
  - id: create-invoice-from-order
    name: CreateInvoiceFromOrder
    type: command
    aggregate: Invoice
    trigger:
      kind: event
      event: OrderPlaced
    input:
      - name: orderId
        type: Uuid
        source: body
      - name: totalAmount
        type: Money
        source: body
      - name: status
        type: OrderStatus
        source: body
    method: process

domainEvents:
  consumed:
    - name: OrderPlaced
      channel: sales.order.placed
      payload:
        - name: orderId
          type: Uuid
        - name: totalAmount
          type: Money
        - name: status
          type: OrderStatus
