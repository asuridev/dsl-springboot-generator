# ─────────────────────────────────────────────────────────────────────────────
# BOUNDED CONTEXT: catalog
# Canasta Shop — Paso 2: Diseño Táctico
# Versión: 1.0.0 | Fecha: 2026-04-22
# ─────────────────────────────────────────────────────────────────────────────

bc: catalog
type: core
description: >
  Manages the product catalog — products, categories, pricing and availability
  status. Authoritative source of product data and prices across the platform.


# ─── ENUMS ───────────────────────────────────────────────────────────────────

enums:

  - name: CategoryStatus
    description: Lifecycle of a product category.
    values:
      - value: ACTIVE
        description: Category is visible and can contain products.
        transitions:
          - to: INACTIVE
            triggeredBy: UC-CAT-010 DeactivateCategory
            condition: none
            emits: null

      - value: INACTIVE
        description: Category is hidden; products cannot be assigned to it.
        transitions:
          - to: ACTIVE
            triggeredBy: UC-CAT-011 ReactivateCategory
            condition: none
            emits: null

  - name: ProductStatus
    description: Lifecycle of a product in the catalog.
    values:
      - value: DRAFT
        description: Product is being configured; not visible to buyers.
        transitions:
          - to: ACTIVE
            triggeredBy: UC-CAT-003 ActivateProduct
            condition: CAT-RULE-001
            rules:
              - CAT-RULE-001
            emits: ProductActivated

      - value: ACTIVE
        description: Product is visible and available for purchase.
        transitions:
          - to: DISCONTINUED
            triggeredBy: UC-CAT-004 DiscontinueProduct
            condition: none
            emits: ProductDiscontinued

      - value: DISCONTINUED
        description: Product has been permanently removed from the catalog.
        transitions: []


# ─── VALUE OBJECTS ───────────────────────────────────────────────────────────

valueObjects:

  - name: Money
    description: >
      Monetary amount with explicit currency. Prevents floating-point
      imprecision (OWASP A04) by storing amount as a high-precision decimal.
    properties:
      - name: amount
        type: Decimal
        precision: 19
        scale: 4
        required: true
        description: Decimal amount with 4-digit precision.
      - name: currency
        type: String(3)
        required: true
        description: ISO 4217 currency code (e.g. COP, USD).


# ─── AGGREGATES ──────────────────────────────────────────────────────────────

aggregates:

  # ── Category ───────────────────────────────────────────────────────────────
  - name: Category
    root: Category
    auditable: true
    softDelete: true
    description: >
      A thematic grouping of products (e.g. Dairy, Fruits & Vegetables,
      Cleaning). Categories have a lifecycle (ACTIVE / INACTIVE) and can be
      archived. Products cannot be activated if their category is INACTIVE.

    properties:
      - name: id
        type: Uuid
        required: true
        readOnly: true
        defaultValue: generated
        description: Unique identifier of the category.

      - name: name
        type: String(200)
        required: true
        unique: true
        description: Human-readable name of the category.

      - name: slug
        type: String(200)
        required: true
        readOnly: true
        unique: true
        description: URL-friendly identifier derived from name; computed server-side.

      - name: description
        type: Text
        required: false
        description: Optional description of the category.

      - name: displayOrder
        type: Integer
        required: false
        description: Relative order for display in navigation menus and storefront.

      - name: status
        type: CategoryStatus
        required: true
        readOnly: true
        defaultValue: ACTIVE
        indexed: true
        description: Lifecycle status of the category.

    entities: []

    domainRules:
      - id: CAT-RULE-005
        type: uniqueness
        errorCode: CATEGORY_NAME_ALREADY_EXISTS
        description: Category name must be unique across all categories.

      - id: CAT-RULE-006
        type: uniqueness
        errorCode: CATEGORY_SLUG_ALREADY_EXISTS
        description: Category slug must be unique across all categories.

      - id: CAT-RULE-007
        type: sideEffect
        description: When a category name is updated, the slug is automatically re-derived.

      - id: CAT-RULE-008
        type: deleteGuard
        errorCode: CATEGORY_HAS_ACTIVE_PRODUCTS
        description: A category cannot be deleted if it has products in DRAFT or ACTIVE status.


  # ── Product ────────────────────────────────────────────────────────────────
  - name: Product
    root: Product
    auditable: true
    softDelete: true
    description: >
      A sellable item in the family basket catalog. Has a name, description,
      price, category, status lifecycle, and associated images. The Product
      is the authoritative source of pricing for the entire platform.

    properties:
      - name: id
        type: Uuid
        required: true
        readOnly: true
        defaultValue: generated
        description: Unique identifier of the product.

      - name: name
        type: String(200)
        required: true
        description: Commercial name of the product.

      - name: slug
        type: String(200)
        required: true
        readOnly: true
        unique: true
        description: URL-friendly identifier derived from name; computed server-side.

      - name: description
        type: Text
        required: false
        description: Detailed description shown to buyers.

      - name: sku
        type: String(100)
        required: true
        unique: true
        description: Internal stock-keeping unit code.

      - name: price
        type: Money
        required: true
        description: Current selling price of the product.

      - name: categoryId
        type: Uuid
        required: true
        indexed: true
        references: Category
        relationship: association
        cardinality: manyToOne
        description: Category this product belongs to.

      - name: status
        type: ProductStatus
        required: true
        readOnly: true
        defaultValue: DRAFT
        indexed: true
        description: Lifecycle status of the product.

    entities:
      - name: ProductImage
        relationship: composition
        cardinality: oneToMany
        description: Image associated with a product, with display order.
        properties:
          - name: id
            type: Uuid
            required: true
            readOnly: true
            defaultValue: generated
            description: Unique identifier of the product image.

          - name: url
            type: Url
            required: true
            description: Publicly accessible URL of the image.

          - name: altText
            type: String(200)
            required: false
            description: Accessibility alternative text for the image.

          - name: displayOrder
            type: Integer
            required: true
            description: Relative display order among a product's images.

      - name: PriceHistory
        relationship: composition
        cardinality: oneToMany
        immutable: true
        description: Immutable record of each price change for audit and compliance.
        properties:
          - name: id
            type: Uuid
            required: true
            readOnly: true
            defaultValue: generated
            description: Unique identifier of the price history entry.

          - name: previousPrice
            type: Money
            required: true
            description: Price before the change.

          - name: newPrice
            type: Money
            required: true
            description: Price after the change.

          - name: changedAt
            type: DateTime
            required: true
            readOnly: true
            defaultValue: now()
            description: Timestamp when the price change was applied.

    domainRules:
      - id: CAT-RULE-001
        type: statePrecondition
        errorCode: PRODUCT_CATEGORY_NOT_ACTIVE
        description: A product can only be activated if its category is in ACTIVE status.

      - id: CAT-RULE-002
        type: terminalState
        errorCode: PRODUCT_ALREADY_DISCONTINUED
        description: A DISCONTINUED product cannot be reactivated or edited.

      - id: CAT-RULE-003
        type: uniqueness
        errorCode: SKU_ALREADY_EXISTS
        description: SKU must be unique across all products.

      - id: CAT-RULE-004
        type: uniqueness
        errorCode: PRODUCT_SLUG_ALREADY_EXISTS
        description: Product slug must be unique across all products.

      - id: CAT-RULE-009
        type: sideEffect
        description: >
          When a product's price is updated, a PriceHistory entry is automatically
          created recording the previous and new price with the timestamp.

      - id: CAT-RULE-010
        type: sideEffect
        description: When a product name is updated, the slug is automatically re-derived.


# ─── INTEGRATIONS ────────────────────────────────────────────────────────────

integrations:

  outbound:
    - name: inventory
      type: internalBc
      pattern: customerSupplier
      protocol: amqp
      description: >
        Notifies inventory of product lifecycle changes so it can manage
        StockItem creation and closure automatically.
      operations:
        - name: ProductActivated
          description: Signals that a new active product requires a StockItem in inventory.
          triggersOn: UC-CAT-003
        - name: ProductDiscontinued
          description: Signals that the product is permanently retired; inventory should close its StockItem.
          triggersOn: UC-CAT-004

    - name: orders
      type: internalBc
      pattern: customerSupplier
      protocol: amqp
      description: >
        Keeps the CatalogSnapshot local read model in orders up-to-date with
        price and lifecycle changes.
      operations:
        - name: ProductPriceChanged
          description: Notifies orders that the price of a product has changed.
          triggersOn: UC-CAT-006
        - name: ProductActivated
          description: Notifies orders so it can add/update the product in CatalogSnapshot.
          triggersOn: UC-CAT-003
        - name: ProductDiscontinued
          description: Notifies orders so it can mark the product as unavailable in CatalogSnapshot.
          triggersOn: UC-CAT-004

  inbound: []


# ─── DOMAIN EVENTS ───────────────────────────────────────────────────────────

domainEvents:

  published:
    - name: ProductActivated
      description: Emitted when a product transitions from DRAFT to ACTIVE.
      payload:
        - name: productId
          type: Uuid
          required: true
        - name: categoryId
          type: Uuid
          required: true
        - name: sku
          type: String(100)
          required: true
        - name: name
          type: String(200)
          required: true
        - name: price
          type: Money
          required: true

    - name: ProductDiscontinued
      description: Emitted when a product transitions to DISCONTINUED permanently.
      payload:
        - name: productId
          type: Uuid
          required: true
        - name: sku
          type: String(100)
          required: true

    - name: ProductPriceChanged
      description: Emitted when a product's price is updated.
      payload:
        - name: productId
          type: Uuid
          required: true
        - name: previousPrice
          type: Money
          required: true
        - name: newPrice
          type: Money
          required: true

  consumed: []


# ─── USE CASES ───────────────────────────────────────────────────────────────

useCases:

  # ── Category Use Cases ──────────────────────────────────────────────────────

  - id: UC-CAT-001
    name: CreateCategory
    type: command
    actor: operator
    trigger:
      kind: http
      operationId: createCategory
    aggregate: Category
    method: create(name, description?, displayOrder?): Category
    repositoryMethod: save(Category)
    rules:
      - CAT-RULE-005
      - CAT-RULE-006
    emits: null
    implementation: scaffold
    fkValidations: []

  - id: UC-CAT-002
    name: UpdateCategory
    type: command
    actor: operator
    trigger:
      kind: http
      operationId: updateCategory
    aggregate: Category
    method: update(name?, description?, displayOrder?): void
    repositoryMethod: save(Category)
    rules:
      - CAT-RULE-005
      - CAT-RULE-006
      - CAT-RULE-007
    emits: null
    notFoundError: CATEGORY_NOT_FOUND
    implementation: scaffold

  - id: UC-CAT-009
    name: DeleteCategory
    type: command
    actor: operator
    trigger:
      kind: http
      operationId: deleteCategory
    aggregate: Category
    method: softDelete(id): void
    repositoryMethod: save(Category)
    rules:
      - CAT-RULE-008
    emits: null
    notFoundError: CATEGORY_NOT_FOUND
    implementation: scaffold

  - id: UC-CAT-010
    name: DeactivateCategory
    type: command
    actor: operator
    trigger:
      kind: http
      operationId: deactivateCategory
    aggregate: Category
    method: deactivate(): void
    repositoryMethod: save(Category)
    rules: []
    emits: null
    notFoundError: CATEGORY_NOT_FOUND
    implementation: full

  - id: UC-CAT-011
    name: ReactivateCategory
    type: command
    actor: operator
    trigger:
      kind: http
      operationId: reactivateCategory
    aggregate: Category
    method: reactivate(): void
    repositoryMethod: save(Category)
    rules: []
    emits: null
    notFoundError: CATEGORY_NOT_FOUND
    implementation: full

  - id: UC-CAT-012
    name: GetCategoryById
    type: query
    actor: operator
    trigger:
      kind: http
      operationId: getCategoryById
    aggregate: Category
    repositoryMethod: findById(Uuid)
    rules: []
    emits: null
    notFoundError: CATEGORY_NOT_FOUND
    implementation: full

  - id: UC-CAT-013
    name: ListCategories
    type: query
    actor: operator
    trigger:
      kind: http
      operationId: listCategories
    aggregate: Category
    repositoryMethod: list(status?, PageRequest)
    rules: []
    emits: null
    implementation: full

  # ── Product Use Cases ───────────────────────────────────────────────────────

  - id: UC-CAT-014
    name: CreateProduct
    type: command
    actor: operator
    trigger:
      kind: http
      operationId: createProduct
    aggregate: Product
    method: create(name, sku, price, categoryId, description?): Product
    repositoryMethod: save(Product)
    rules:
      - CAT-RULE-003
      - CAT-RULE-004
    emits: null
    implementation: scaffold
    fkValidations:
      - field: categoryId
        aggregate: Category
        notFoundError: CATEGORY_NOT_FOUND

  - id: UC-CAT-003
    name: ActivateProduct
    type: command
    actor: operator
    trigger:
      kind: http
      operationId: activateProduct
    aggregate: Product
    method: activate(): void
    repositoryMethod: save(Product)
    rules:
      - CAT-RULE-001
      - CAT-RULE-002
    emits: ProductActivated
    notFoundError: PRODUCT_NOT_FOUND
    implementation: scaffold

  - id: UC-CAT-004
    name: DiscontinueProduct
    type: command
    actor: operator
    trigger:
      kind: http
      operationId: discontinueProduct
    aggregate: Product
    method: discontinue(): void
    repositoryMethod: save(Product)
    rules:
      - CAT-RULE-002
    emits: ProductDiscontinued
    notFoundError: PRODUCT_NOT_FOUND
    implementation: scaffold

  - id: UC-CAT-005
    name: UpdateProductDetails
    type: command
    actor: operator
    trigger:
      kind: http
      operationId: updateProductDetails
    aggregate: Product
    method: updateDetails(name?, description?): void
    repositoryMethod: save(Product)
    rules:
      - CAT-RULE-002
      - CAT-RULE-004
      - CAT-RULE-010
    emits: null
    notFoundError: PRODUCT_NOT_FOUND
    implementation: scaffold

  - id: UC-CAT-006
    name: UpdateProductPrice
    type: command
    actor: operator
    trigger:
      kind: http
      operationId: updateProductPrice
    aggregate: Product
    method: updatePrice(newPrice): void
    repositoryMethod: save(Product)
    rules:
      - CAT-RULE-002
      - CAT-RULE-009
    emits: ProductPriceChanged
    notFoundError: PRODUCT_NOT_FOUND
    implementation: scaffold

  - id: UC-CAT-007
    name: UpdateProductCategory
    type: command
    actor: operator
    trigger:
      kind: http
      operationId: updateProductCategory
    aggregate: Product
    method: updateCategory(categoryId): void
    repositoryMethod: save(Product)
    rules:
      - CAT-RULE-002
    emits: null
    notFoundError: PRODUCT_NOT_FOUND
    implementation: full
    fkValidations:
      - field: categoryId
        aggregate: Category
        notFoundError: CATEGORY_NOT_FOUND

  - id: UC-CAT-008
    name: DeleteProduct
    type: command
    actor: operator
    trigger:
      kind: http
      operationId: deleteProduct
    aggregate: Product
    method: softDelete(id): void
    repositoryMethod: save(Product)
    rules:
      - CAT-RULE-002
    emits: null
    notFoundError: PRODUCT_NOT_FOUND
    implementation: scaffold

  - id: UC-CAT-015
    name: AddProductImage
    type: command
    actor: operator
    trigger:
      kind: http
      operationId: addProductImage
    aggregate: Product
    method: addImage(url, altText?, displayOrder): void
    repositoryMethod: save(Product)
    rules:
      - CAT-RULE-002
    emits: null
    notFoundError: PRODUCT_NOT_FOUND
    implementation: full

  - id: UC-CAT-016
    name: RemoveProductImage
    type: command
    actor: operator
    trigger:
      kind: http
      operationId: removeProductImage
    aggregate: Product
    method: removeImage(imageId): void
    repositoryMethod: save(Product)
    rules:
      - CAT-RULE-002
    emits: null
    notFoundError:
      - PRODUCT_NOT_FOUND
      - PRODUCT_IMAGE_NOT_FOUND
    implementation: full

  - id: UC-CAT-017
    name: GetProductById
    type: query
    actor: operator
    trigger:
      kind: http
      operationId: getProductById
    aggregate: Product
    repositoryMethod: findById(Uuid)
    rules: []
    emits: null
    notFoundError: PRODUCT_NOT_FOUND
    implementation: full

  - id: UC-CAT-018
    name: ListProducts
    type: query
    actor: operator
    trigger:
      kind: http
      operationId: listProducts
    aggregate: Product
    repositoryMethod: list(categoryId?, status?, PageRequest)
    rules: []
    emits: null
    implementation: full

  - id: UC-CAT-019
    name: SearchProducts
    type: query
    actor: customer
    trigger:
      kind: http
      operationId: searchProducts
    aggregate: Product
    repositoryMethod: searchByNameOrSku(String, PageRequest)
    rules: []
    emits: null
    implementation: full

  - id: UC-CAT-020
    name: GetActiveProductById
    type: query
    actor: customer
    trigger:
      kind: http
      operationId: getActiveProductById
    aggregate: Product
    repositoryMethod: findById(Uuid)
    rules: []
    emits: null
    notFoundError: PRODUCT_NOT_FOUND
    implementation: full


# ─── REPOSITORIES ────────────────────────────────────────────────────────────

repositories:

  - aggregate: Category
    methods:
      - name: findById
        params:
          - name: id
            type: Uuid
        returns: "Category?"
        derivedFrom: implicit

      - name: findByName
        params:
          - name: name
            type: String(200)
        returns: "Category?"
        derivedFrom: CAT-RULE-005

      - name: findBySlug
        params:
          - name: slug
            type: String(200)
        returns: "Category?"
        derivedFrom: CAT-RULE-006

      - name: countProductsInCategory
        params:
          - name: categoryId
            type: Uuid
          - name: statuses
            type: List[ProductStatus]
        returns: Int
        derivedFrom: CAT-RULE-008

      - name: list
        params:
          - name: status
            type: CategoryStatus
            required: false
          - name: page
            type: PageRequest
            required: true
        returns: "Page[Category]"
        derivedFrom: openapi:listCategories

      - name: save
        params:
          - name: entity
            type: Category
        derivedFrom: implicit

  - aggregate: Product
    methods:
      - name: findById
        params:
          - name: id
            type: Uuid
        returns: "Product?"
        derivedFrom: implicit

      - name: findBySku
        params:
          - name: sku
            type: String(100)
        returns: "Product?"
        derivedFrom: CAT-RULE-003

      - name: findBySlug
        params:
          - name: slug
            type: String(200)
        returns: "Product?"
        derivedFrom: CAT-RULE-004

      - name: list
        params:
          - name: categoryId
            type: Uuid
            required: false
          - name: status
            type: ProductStatus
            required: false
          - name: page
            type: PageRequest
            required: true
        returns: "Page[Product]"
        derivedFrom: openapi:listProducts

      - name: searchByNameOrSku
        params:
          - name: query
            type: String
          - name: page
            type: PageRequest
            required: true
        returns: "Page[Product]"
        derivedFrom: openapi:searchProducts

      - name: save
        params:
          - name: entity
            type: Product
        derivedFrom: implicit


# ─── ERRORS ──────────────────────────────────────────────────────────────────

errors:
  - code: CATEGORY_NOT_FOUND
    httpStatus: 404
    errorType: CategoryNotFoundError

  - code: CATEGORY_NAME_ALREADY_EXISTS
    httpStatus: 409
    errorType: CategoryNameAlreadyExistsError

  - code: CATEGORY_SLUG_ALREADY_EXISTS
    httpStatus: 409
    errorType: CategorySlugAlreadyExistsError

  - code: CATEGORY_HAS_ACTIVE_PRODUCTS
    httpStatus: 409
    errorType: CategoryHasActiveProductsError

  - code: PRODUCT_NOT_FOUND
    httpStatus: 404
    errorType: ProductNotFoundError

  - code: PRODUCT_IMAGE_NOT_FOUND
    httpStatus: 404
    errorType: ProductImageNotFoundError

  - code: SKU_ALREADY_EXISTS
    httpStatus: 409
    errorType: SkuAlreadyExistsError

  - code: PRODUCT_SLUG_ALREADY_EXISTS
    httpStatus: 409
    errorType: ProductSlugAlreadyExistsError

  - code: PRODUCT_CATEGORY_NOT_ACTIVE
    httpStatus: 422
    errorType: ProductCategoryNotActiveError

  - code: PRODUCT_ALREADY_DISCONTINUED
    httpStatus: 409
    errorType: ProductAlreadyDiscontinuedError
