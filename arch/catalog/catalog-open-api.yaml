openapi: "3.1.0"
info:
  title: Catalog BC — REST API
  description: >
    Public API for the catalog bounded context. Manages products, categories,
    pricing and availability. Consumed by internal operators and end customers.
  version: "1.0.0"
  contact:
    name: Catalog Team

servers:
  - url: /api/catalog/v1
    description: Default server

tags:
  - name: categories
    description: Operations related to product categories
  - name: products
    description: Operations related to products
  - name: product-images
    description: Operations related to product images
  - name: storefront
    description: Read-only product operations for end customers

paths:

  # ── Categories ─────────────────────────────────────────────────────────────

  /categories:
    post:
      operationId: createCategory
      summary: Create a new product category
      tags: [categories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: Category created successfully.
          headers:
            Location:
              description: URL of the newly created category.
              schema:
                type: string
        "409":
          $ref: "#/components/responses/Conflict"

    get:
      operationId: listCategories
      summary: List categories with optional status filter
      tags: [categories]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CategoryStatus"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated list of categories.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryPage"

  /categories/{id}:
    get:
      operationId: getCategoryById
      summary: Get a category by ID
      tags: [categories]
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Category detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: updateCategory
      summary: Update category fields
      tags: [categories]
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryRequest"
      responses:
        "204":
          description: Category updated successfully.
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

    delete:
      operationId: deleteCategory
      summary: Soft-delete a category (only if no active products)
      tags: [categories]
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Category deleted successfully.
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /categories/{id}/deactivate:
    patch:
      operationId: deactivateCategory
      summary: Transition category to INACTIVE
      tags: [categories]
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Category deactivated successfully.
        "404":
          $ref: "#/components/responses/NotFound"

  /categories/{id}/reactivate:
    patch:
      operationId: reactivateCategory
      summary: Transition category from INACTIVE back to ACTIVE
      tags: [categories]
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Category reactivated successfully.
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Products ───────────────────────────────────────────────────────────────

  /products:
    post:
      operationId: createProduct
      summary: Create a new product in DRAFT status
      tags: [products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Product created successfully.
          headers:
            Location:
              description: URL of the newly created product.
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

    get:
      operationId: listProducts
      summary: List products with optional filters (operator view — all statuses)
      tags: [products]
      parameters:
        - name: categoryId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ProductStatus"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated list of products.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductPage"

  /products/{id}:
    get:
      operationId: getProductById
      summary: Get a product by ID (operator view)
      tags: [products]
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Product detail with images and price history.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteProduct
      summary: Soft-delete a product (not allowed if DISCONTINUED)
      tags: [products]
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Product deleted successfully.
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /products/{id}/activate:
    patch:
      operationId: activateProduct
      summary: Transition product from DRAFT to ACTIVE
      tags: [products]
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Product activated successfully.
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /products/{id}/discontinue:
    patch:
      operationId: discontinueProduct
      summary: Transition product to DISCONTINUED (permanent)
      tags: [products]
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Product discontinued successfully.
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /products/{id}/details:
    patch:
      operationId: updateProductDetails
      summary: Update product name and/or description
      tags: [products]
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductDetailsRequest"
      responses:
        "204":
          description: Product details updated.
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /products/{id}/price:
    patch:
      operationId: updateProductPrice
      summary: Update product price
      tags: [products]
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductPriceRequest"
      responses:
        "204":
          description: Price updated successfully.
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /products/{id}/category:
    patch:
      operationId: updateProductCategory
      summary: Reassign a product to a different category
      tags: [products]
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductCategoryRequest"
      responses:
        "204":
          description: Product category updated.
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── Product Images ──────────────────────────────────────────────────────────

  /products/{id}/images:
    post:
      operationId: addProductImage
      summary: Add an image to a product
      tags: [product-images]
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProductImageRequest"
      responses:
        "201":
          description: Image added successfully.
          headers:
            Location:
              description: URL of the product (images are accessed via the product resource).
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /products/{id}/images/{imageId}:
    delete:
      operationId: removeProductImage
      summary: Remove an image from a product
      tags: [product-images]
      parameters:
        - $ref: "#/components/parameters/Id"
        - name: imageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Image removed successfully.
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Storefront (Customer) ──────────────────────────────────────────────────

  /storefront/products:
    get:
      operationId: searchProducts
      summary: Search ACTIVE products by name or SKU (customer-facing)
      tags: [storefront]
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search term matched against product name or SKU.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated list of matching ACTIVE products.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductPage"

  /storefront/products/{id}:
    get:
      operationId: getActiveProductById
      summary: Get an ACTIVE product by ID (customer-facing storefront)
      tags: [storefront]
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Product detail (only ACTIVE products are visible).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          $ref: "#/components/responses/NotFound"

# ── Components ───────────────────────────────────────────────────────────────

components:

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: PRODUCT_NOT_FOUND
            message: "Product with the given ID was not found."

    Conflict:
      description: Business rule conflict.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: SKU_ALREADY_EXISTS
            message: "A product with this SKU already exists."

    UnprocessableEntity:
      description: Business precondition not met.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: PRODUCT_CATEGORY_NOT_ACTIVE
            message: "The product's category must be ACTIVE before the product can be activated."

  schemas:

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code.
          example: PRODUCT_NOT_FOUND
        message:
          type: string
          description: Human-readable error message.

    Money:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: string
          description: Decimal amount string with 4-digit precision. Never a float.
          example: "3500.0000"
        currency:
          type: string
          description: ISO 4217 currency code.
          example: COP

    CategoryStatus:
      type: string
      enum: [ACTIVE, INACTIVE]

    ProductStatus:
      type: string
      enum: [DRAFT, ACTIVE, DISCONTINUED]

    # ── Category Schemas ──────────────────────────────────────────────────────

    CreateCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
        displayOrder:
          type: integer

    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
        displayOrder:
          type: integer

    CategoryResponse:
      type: object
      required: [id, name, slug, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        displayOrder:
          type: integer
        status:
          $ref: "#/components/schemas/CategoryStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CategoryPage:
      type: object
      required: [data, total, page, size, pages]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CategoryResponse"
        total:
          type: integer
        page:
          type: integer
        size:
          type: integer
        pages:
          type: integer

    # ── Product Schemas ───────────────────────────────────────────────────────

    CreateProductRequest:
      type: object
      required: [name, sku, price, categoryId]
      properties:
        name:
          type: string
          maxLength: 200
        sku:
          type: string
          maxLength: 100
        price:
          $ref: "#/components/schemas/Money"
        categoryId:
          type: string
          format: uuid
        description:
          type: string

    UpdateProductDetailsRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string

    UpdateProductPriceRequest:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: string
          description: New price amount as decimal string.
          example: "3800.0000"
        currency:
          type: string
          description: ISO 4217 currency code.
          example: COP

    UpdateProductCategoryRequest:
      type: object
      required: [categoryId]
      properties:
        categoryId:
          type: string
          format: uuid

    AddProductImageRequest:
      type: object
      required: [url, displayOrder]
      properties:
        url:
          type: string
          format: uri
        altText:
          type: string
          maxLength: 200
        displayOrder:
          type: integer

    ProductImageResponse:
      type: object
      required: [id, url, displayOrder]
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        altText:
          type: string
        displayOrder:
          type: integer

    ProductResponse:
      type: object
      required: [id, name, slug, sku, price, categoryId, status, images, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        sku:
          type: string
        price:
          $ref: "#/components/schemas/Money"
        categoryId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/ProductStatus"
        images:
          type: array
          items:
            $ref: "#/components/schemas/ProductImageResponse"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProductPage:
      type: object
      required: [data, total, page, size, pages]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ProductResponse"
        total:
          type: integer
        page:
          type: integer
        size:
          type: integer
        pages:
          type: integer
