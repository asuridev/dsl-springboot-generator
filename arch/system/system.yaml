# ─────────────────────────────────────────────────────────────────────────────
# SYSTEM ARCHITECTURE — PASO 1: DISEÑO ESTRATÉGICO
# Plataforma de Venta de Canasta Familiar
# Versión: 1.0.0 | Fecha: 2026-04-22
# ─────────────────────────────────────────────────────────────────────────────

# ─── IDENTIDAD DEL SISTEMA ───────────────────────────────────────────────────
system:
  name: canasta-shop
  description: >
    B2C e-commerce platform for selling family basket products (groceries and
    household essentials). The company owns the inventory, manages its own
    delivery fleet, and sells directly to end consumers with card and
    cash-on-delivery payment options.
  domainType: core

# ─── BOUNDED CONTEXTS ────────────────────────────────────────────────────────
boundedContexts:

  - name: catalog
    type: core
    purpose: >
      Manages the product catalog — products, categories, pricing and
      availability status. It is the authoritative source of product data
      and prices across the entire platform.
    aggregates:
      - name: Product
        root: Product
        entities:
          - ProductImage
      - name: Category
        root: Category
        entities: []

  - name: orders
    type: core
    purpose: >
      Manages the full order lifecycle from cart/checkout to delivery
      confirmation. It orchestrates the checkout flow and is the source of
      truth for order state and order line prices (snapshot at write time).
    aggregates:
      - name: Cart
        root: Cart
        entities:
          - CartItem
      - name: Order
        root: Order
        entities:
          - OrderLine
          - OrderStatusHistory
      - name: CatalogSnapshot
        root: CatalogSnapshot
        entities: []

  - name: customers
    type: core
    purpose: >
      Manages customer profiles, authentication and delivery addresses.
      Provides identity and address resolution to the orders flow.
    aggregates:
      - name: Customer
        root: Customer
        entities:
          - Address
      - name: Session
        root: Session
        entities: []

  - name: inventory
    type: supporting
    purpose: >
      Tracks real-time stock levels for each product. Reserves stock when
      an order is placed and releases it on cancellation. Reacts to catalog
      lifecycle events to create or close stock items.
    aggregates:
      - name: StockItem
        root: StockItem
        entities:
          - StockMovement

  - name: payments
    type: supporting
    purpose: >
      Processes card payments via external gateway and records cash-on-delivery
      payment intents. Maintains a local read model of order totals fed by
      order events to avoid reading order data at payment time.
    aggregates:
      - name: Payment
        root: Payment
        entities:
          - PaymentAttempt
      - name: OrderAmountSnapshot
        root: OrderAmountSnapshot
        entities: []

  - name: delivery
    type: supporting
    purpose: >
      Manages delivery orders assigned to the company's own delivery fleet.
      Tracks delivery status from assignment to completion and notifies
      relevant parties on state changes.
    aggregates:
      - name: DeliveryOrder
        root: DeliveryOrder
        entities:
          - DeliveryStatusHistory
      - name: DeliveryDriver
        root: DeliveryDriver
        entities: []

  - name: notifications
    type: supporting
    purpose: >
      Sends transactional notifications to customers (email, SMS, push) in
      response to key order and delivery lifecycle events. It does not own
      business logic — it only formats and dispatches messages.
    aggregates:
      - name: Notification
        root: Notification
        entities: []
      - name: NotificationTemplate
        root: NotificationTemplate
        entities: []

# ─── SISTEMAS EXTERNOS ───────────────────────────────────────────────────────
externalSystems:

  - name: payment-gateway
    description: >
      External payment processor for card transactions (e.g. Stripe,
      Mercado Pago, PayU). Handles card authorization, capture and refunds.
    type: payment-gateway

# ─── MAPA DE INTEGRACIONES ───────────────────────────────────────────────────
integrations:

  # ── Catalog lifecycle → Inventory ─────────────────────────────────────────
  - from: catalog
    to: inventory
    pattern: event
    channel: message-broker
    contracts:
      - name: ProductActivated
        channel: catalog.product.activated
      - name: ProductDiscontinued
        channel: catalog.product.discontinued
    notes: >
      Inventory reacts to catalog lifecycle events: creates a StockItem when a
      product is activated, and permanently closes it when discontinued.

  # ── Catalog price changes → Orders (Local Read Model) ─────────────────────
  - from: catalog
    to: orders
    pattern: event
    channel: message-broker
    contracts:
      - name: ProductPriceChanged
        channel: catalog.product.price-changed
      - name: ProductActivated
        channel: catalog.product.activated
      - name: ProductDiscontinued
        channel: catalog.product.discontinued
    notes: >
      orders maintains a CatalogSnapshot local read model fed by catalog events.
      Designer chose LRM after explicit OWASP A04 trade-off evaluation.
      Eventual consistency accepted. Step 2 MUST implement cross-validation at
      checkout to mitigate the fraud window risk: verify CatalogSnapshot.price
      matches the last known catalog price before confirming OrderLine.unitPrice.

  # ── Orders → Inventory (reserve stock on order placed) ────────────────────
  - from: orders
    to: inventory
    pattern: event
    channel: message-broker
    contracts:
      - name: OrderPlaced
        channel: orders.order.placed
      - name: OrderCancelled
        channel: orders.order.cancelled
    notes: >
      Inventory reserves stock when OrderPlaced is received and releases it
      when OrderCancelled is received (compensation flow).

  # ── Inventory → Orders (stock reservation result) ─────────────────────────
  - from: inventory
    to: orders
    pattern: event
    channel: message-broker
    contracts:
      - name: StockReserved
        channel: inventory.stock.reserved
      - name: StockReservationFailed
        channel: inventory.stock.reservation-failed
      - name: StockReleased
        channel: inventory.stock.released
    notes: >
      Orders reacts to StockReserved by advancing to payment step.
      StockReservationFailed triggers order cancellation (CheckoutSaga compensation).

  # ── Orders → Payments (order total snapshot for LRM) ──────────────────────
  - from: orders
    to: payments
    pattern: event
    channel: message-broker
    contracts:
      - name: OrderPaymentRequired
        channel: orders.order.payment-required
      - name: OrderCancelled
        channel: orders.order.cancelled
    notes: >
      payments maintains an OrderAmountSnapshot local read model.
      Designer chose LRM for Payment.amount after explicit OWASP A04 evaluation.
      Eventual consistency accepted. Step 2 MUST implement cross-validation:
      verify OrderAmountSnapshot.total before initiating card charge to mitigate
      the fraud window risk.

  # ── Payments → Orders (payment result) ────────────────────────────────────
  - from: payments
    to: orders
    pattern: event
    channel: message-broker
    contracts:
      - name: PaymentApproved
        channel: payments.payment.approved
      - name: PaymentFailed
        channel: payments.payment.failed
      - name: PaymentCancelled
        channel: payments.payment.cancelled
    notes: >
      Orders reacts to PaymentApproved by confirming the order (OrderConfirmed).
      PaymentFailed triggers order cancellation and stock release (compensation).
      PaymentCancelled is the saga compensation event emitted when a payment is
      rolled back after OrderCancelled is received.

  # ── Orders → Delivery (confirmed order triggers delivery) ─────────────────
  - from: orders
    to: delivery
    pattern: event
    channel: message-broker
    contracts:
      - name: OrderConfirmed
        channel: orders.order.confirmed
      - name: OrderCancelled
        channel: orders.order.cancelled
    notes: >
      Delivery creates a DeliveryOrder when OrderConfirmed is received.
      Delivery cancels the DeliveryOrder if OrderCancelled arrives before
      the delivery has started (compensation path).

  # ── Delivery → Orders (delivery completed) ────────────────────────────────
  - from: delivery
    to: orders
    pattern: event
    channel: message-broker
    contracts:
      - name: OrderDelivered
        channel: delivery.order.delivered
    notes: >
      Orders marks the order as DELIVERED when OrderDelivered is received,
      closing the order lifecycle.

  # ── Notifications fan-out from Orders ─────────────────────────────────────
  - from: orders
    to: notifications
    pattern: event
    channel: message-broker
    contracts:
      - name: OrderConfirmed
        channel: orders.order.confirmed
      - name: OrderCancelled
        channel: orders.order.cancelled
    notes: >
      Notifications sends customer confirmations and cancellation alerts
      triggered by order lifecycle events.

  # ── Notifications fan-out from Delivery ───────────────────────────────────
  - from: delivery
    to: notifications
    pattern: event
    channel: message-broker
    contracts:
      - name: DeliveryAssigned
        channel: delivery.order.assigned
      - name: OrderDelivered
        channel: delivery.order.delivered
    notes: >
      Notifications alerts customers when a delivery driver is assigned
      and when the order has been delivered.

  # ── Payments → Payment Gateway (ACL) ──────────────────────────────────────
  - from: payments
    to: payment-gateway
    pattern: acl
    channel: http
    contracts:
      - processCardPayment
      - refundPayment
    notes: >
      ACL isolates the internal Payment domain from the external gateway model.
      The payments BC translates internal commands into gateway-specific API calls.

# ─── SAGA: CHECKOUT ──────────────────────────────────────────────────────────
sagas:
  - name: CheckoutSaga
    description: >
      Coordinates the full checkout flow across orders, inventory and payments.
      Ensures atomicity with compensating events: if any step fails, previous
      steps are rolled back (stock released, order cancelled).
    trigger:
      event: OrderPlaced
      bc: orders
    steps:
      - order: 1
        bc: inventory
        triggeredBy: OrderPlaced
        onSuccess: StockReserved
        onFailure: StockReservationFailed
        compensation: StockReleased
      - order: 2
        bc: payments
        triggeredBy: StockReserved
        onSuccess: PaymentApproved
        onFailure: PaymentFailed
        compensation: PaymentCancelled
      - order: 3
        bc: orders
        triggeredBy: PaymentApproved
        onSuccess: OrderConfirmed
        onFailure: OrderCancelled

# ─── INFRAESTRUCTURA ─────────────────────────────────────────────────────────
infrastructure:

  deployment:
    strategy: modular-monolith
    architectureStyle: hexagonal
    notes: >
      Default applied. Modular monolith allows fast delivery in V1 while
      preserving the option to extract BCs as microservices later without
      touching domain code.

  messageBroker:
    technology: rabbitmq
    notes: >
      Default applied. RabbitMQ is sufficient for the event volume expected
      in V1. Can be replaced by Kafka if message replay or high-throughput
      analytics are needed in future iterations.

  database:
    technology: postgresql
    isolationStrategy: schema-per-bc
    notes: >
      Default applied. schema-per-bc aligns with modular-monolith strategy
      and enables future extraction to db-per-bc when moving to microservices.
