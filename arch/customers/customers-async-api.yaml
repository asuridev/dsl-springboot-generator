asyncapi: "2.6.0"
info:
  title: Customers BC — Async API
  version: "1.0.0"
  description: >
    Event contracts for the customers bounded context.
    In V1, customers does not publish or consume any domain events via the
    message broker. All integration with other BCs (e.g. orders resolving
    delivery addresses) is handled via synchronous HTTP.
    This file is a placeholder for future async integrations.
defaultContentType: application/json
servers:
  rabbitmq:
    url: amqp://rabbitmq:5672
    protocol: amqp
    description: RabbitMQ message broker (modular-monolith deployment).

channels: {}

components:
  schemas:
    EventHeaders:
      type: object
      required: [eventId, eventType, occurredAt, sourceBC]
      properties:
        eventId:
          type: string
          format: uuid
          description: Unique identifier of this event instance.
        eventType:
          type: string
          description: Fully-qualified event type name.
        occurredAt:
          type: string
          format: date-time
          description: UTC timestamp when the event occurred.
        sourceBC:
          type: string
          description: Name of the bounded context that emitted this event.
        correlationId:
          type: string
          format: uuid
          description: Optional correlation ID for distributed tracing.
