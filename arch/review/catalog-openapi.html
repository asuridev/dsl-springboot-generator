    "title": "Catalog BC — REST API",

            "application/json": {
              "schema": {
                "type": "object",

                  "name"

                  "description": {

                  },
                  "displayOrder": {
                    "type": "integer"
                  }

              }
            }

          "201": {
            "description": "Category created successfully.",
            "headers": {
              "Location": {
                "description": "URL of the newly created category.",
                "schema": {
                  "type": "string"
                }
              }

              "application/json": {
                "schema": {
                  "type": "object",
                  "required": [
                    "code",
                    "message"

                  "properties": {
                    "code": {

            "name": "size",

              "type": "integer",

                    "total",

                    "size",
                    "pages"

                    "data": {

      "patch": {
        "operationId": "updateCategory",

        "responses": {

              }
            }
          },
          "409": {
            "description": "Business rule conflict.",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponse"
                },
                "example": {
                  "code": "SKU_ALREADY_EXISTS",

          }

      },
      "delete": {
        "operationId": "deleteCategory",
        "summary": "Soft-delete a category (only if no active products)",

          "categories"

            "name": "id",

            "required": true,

              "type": "string",
              "format": "uuid"

          }
        ],
        "responses": {
          "204": {
            "description": "Category deleted successfully."

          "404": {
            "description": "Resource not found.",
            "content": {
              "application/json": {

                "example": {

                }
              }
            }
          },
          "409": {
            "description": "Business rule conflict.",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponse"
                },
                "example": {
                  "code": "SKU_ALREADY_EXISTS",
                  "message": "A product with this SKU already exists."
                }
              }
            }
          }
        }
      }

    "/categories/{id}/deactivate": {
      "patch": {
        "operationId": "deactivateCategory",
        "summary": "Transition category to INACTIVE",
        "tags": [
          "categories"
        ],
        "parameters": [

            "name": "id",
            "in": "path",
            "required": true,
            "schema": {

    "/categories/{id}/reactivate": {
      "patch": {
        "operationId": "reactivateCategory",
        "summary": "Transition category from INACTIVE back to ACTIVE",

          "categories"
        ],
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"

          }
        ],
        "responses": {
          "204": {
            "description": "Category reactivated successfully."

            "description": "Resource not found.",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponse"

                  "code": "PRODUCT_NOT_FOUND",

              }
            }
          }
        }
      }
    },
    "/products": {
      "post": {
        "operationId": "createProduct",
        "summary": "Create a new product in DRAFT status",
        "tags": [
          "products"
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "required": [
                  "name",
                  "sku",
                  "price",
                  "categoryId"
                ],
                "properties": {
                  "name": {
                    "type": "string",
                    "maxLength": 200
                  },
                  "sku": {
                    "type": "string",
                    "maxLength": 100
                  },
                  "price": {
                    "type": "object",
                    "required": [
                      "amount",
                      "currency"
                    ],
                    "properties": {
                      "amount": {
                        "type": "string",
                        "description": "Decimal amount string with 4-digit precision. Never a float.",
                        "example": "3500.0000"
                      },
                      "currency": {
                        "type": "string",
                        "description": "ISO 4217 currency code.",
                        "example": "COP"
                      }
                    }
                  },
                  "categoryId": {
                    "type": "string",
                    "format": "uuid"
                  },
                  "description": {
                    "type": "string"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "201": {
            "description": "Product created successfully.",
            "headers": {
              "Location": {
                "description": "URL of the newly created product.",
                "schema": {
                  "type": "string"
                }
              }
            }
          },
          "404": {
            "description": "Resource not found.",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponse"
                },
                "example": {
                  "code": "PRODUCT_NOT_FOUND",

                }
              }
            }
          },
          "409": {
            "description": "Business rule conflict.",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponse"
                },
                "example": {
                  "code": "SKU_ALREADY_EXISTS",
                  "message": "A product with this SKU already exists."
                }
              }
            }
          }
        }
      },
      "get": {
        "operationId": "listProducts",
        "summary": "List products with optional filters (operator view — all statuses)",
        "tags": [
          "products"
        ],
        "parameters": [
          {
            "name": "categoryId",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          },
          {
            "name": "status",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "enum": [
                "DRAFT",
                "ACTIVE",
                "DISCONTINUED"
              ]
            }
          },
          {
            "name": "page",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer",
              "default": 0
            }
          },
          {
            "name": "size",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer",
              "default": 20
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Paginated list of products.",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "required": [
                    "data",
                    "total",
                    "page",
                    "size",
                    "pages"
                  ],
                  "properties": {
                    "data": {
                      "type": "array",
                      "items": {
                        "type": "object",
                        "required": [
                          "id",
                          "name",
                          "slug",
                          "sku",
                          "price",
                          "categoryId",
                          "status",
                          "images",
                          "createdAt",
                          "updatedAt"
                        ],
                        "properties": {
                          "id": {
                            "type": "string",
                            "format": "uuid"
                          },
                          "name": {
                            "type": "string"
                          },
                          "slug": {
                            "type": "string"
                          },
                          "description": {
                            "type": "string"
                          },
                          "sku": {
                            "type": "string"
                          },
                          "price": {
                            "type": "object",
                            "required": [
                              "amount",
                              "currency"
                            ],
                            "properties": {
                              "amount": {
                                "type": "string",
                                "description": "Decimal amount string with 4-digit precision. Never a float.",
                                "example": "3500.0000"
                              },
                              "currency": {
                                "type": "string",
                                "description": "ISO 4217 currency code.",
                                "example": "COP"
                              }
                            }
                          },
                          "categoryId": {
                            "type": "string",
                            "format": "uuid"
                          },
                          "status": {
                            "type": "string",
                            "enum": [
                              "DRAFT",
                              "ACTIVE",
                              "DISCONTINUED"
                            ]
                          },
                          "images": {
                            "type": "array",
                            "items": {
                              "type": "object",
                              "required": [
                                "id",
                                "url",
                                "displayOrder"

                              "properties": {

                                },

                                  "type": "string"
                                },

                                  "type": "integer"

                            }
                          },

                            "format": "date-time"
                          },

                            "type": "string",
                            "format": "date-time"
                          }

                      "type": "integer"

    "/products/{id}": {

        "parameters": [

            "content": {

                "example": {

                }

          },
          "409": {

            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponse"

                "example": {

                }

          }
        }
      }

      "patch": {
        "operationId": "activateProduct",
        "summary": "Transition product from DRAFT to ACTIVE",
        "tags": [
          "products"
        ],
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string",
