<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>customers — Design</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <style>
    body { background: #f5f6f8; }
    .diagram-wrap {
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: .5rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .seq-wrap { overflow-x: auto; text-align: left; }
    .diag-target { display: inline-block; max-width: 100%; }
    .seq-wrap .diag-target { display: block; min-width: 600px; }
    .diag-error pre {
      background: #fff8e1; border: 1px solid #ffe082; border-radius: .4rem;
      padding: 1rem; font-size: .78rem; text-align: left; white-space: pre-wrap; margin: 0;
    }
    .diagram-title { color: #495057; font-size: .85rem; font-weight: 600; margin-bottom: .5rem; text-transform: uppercase; letter-spacing: .04em; }
    .nav-tabs .nav-link { font-size: .9rem; }
    .loading-spinner { color: #adb5bd; font-size: .85rem; padding: 2rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-xl d-flex justify-content-between align-items-center flex-wrap gap-2">
      <div class="d-flex align-items-center gap-3">
        <a href="index.html" class="text-white-50 text-decoration-none small">&#8592; Dashboard</a>
        <span class="navbar-brand fw-bold mb-0">customers — Design</span>
      </div>
      <div class="d-flex gap-2"><a href="customers-openapi.html" class="btn btn-sm btn-outline-success">REST API</a><a href="customers-asyncapi.html" class="btn btn-sm btn-outline-primary">Events</a></div>
    </div>
  </nav>

  <div class="container-xl pb-5">
    <ul class="nav nav-tabs mb-4" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="tab-overview" data-bs-toggle="tab"
          data-bs-target="#pane-overview" type="button" role="tab">Overview</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="tab-domain" data-bs-toggle="tab"
          data-bs-target="#pane-domain" type="button" role="tab">Domain Model</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="tab-states" data-bs-toggle="tab"
          data-bs-target="#pane-states" type="button" role="tab">States <span class="badge bg-secondary ms-1">2</span></button>
      </li>
    </ul>
    <div class="tab-content">
      <div class="tab-pane fade show active" id="pane-overview" role="tabpanel">
        <div class="diagram-wrap"><div id="diag-0" class="diag-target"></div></div>
      </div>
      <div class="tab-pane fade" id="pane-domain" role="tabpanel">
        <div class="diagram-wrap"><div id="diag-1" class="diag-target"></div></div>
      </div>
      <div class="tab-pane fade" id="pane-states" role="tabpanel">
        <h6 class="diagram-title">Customer States</h6><div class="diagram-wrap"><div id="diag-2" class="diag-target"></div></div><h6 class="diagram-title">Session States</h6><div class="diagram-wrap"><div id="diag-3" class="diag-target"></div></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const DIAGRAMS = [{"id":"diag-0","source":"flowchart LR\r\n    subgraph Actores\r\n        CU([\"customer\"])\r\n        OP([\"operator\"])\r\n    end\r\n\r\n    subgraph customers[\"Bounded Context: customers\"]\r\n        subgraph Cuenta[\"Cuenta de Cliente\"]\r\n            UC01[\"UC-CUS-001 RegisterCustomer\"]\r\n            UC02[\"UC-CUS-002 ListCustomers\"]\r\n            UC03[\"UC-CUS-003 GetCustomerById\"]\r\n            UC04[\"UC-CUS-004 UpdateCustomer\"]\r\n            UC05[\"UC-CUS-005 SuspendCustomer\"]\r\n            UC06[\"UC-CUS-006 ReactivateCustomer\"]\r\n        end\r\n\r\n        subgraph Direcciones[\"Direcciones de Entrega\"]\r\n            UC07[\"UC-CUS-007 AddAddress\"]\r\n            UC08[\"UC-CUS-008 ListAddresses\"]\r\n            UC09[\"UC-CUS-009 GetAddressById\"]\r\n            UC10[\"UC-CUS-010 UpdateAddress\"]\r\n            UC11[\"UC-CUS-011 RemoveAddress\"]\r\n        end\r\n\r\n        subgraph Sesiones[\"Autenticacion\"]\r\n            UC12[\"UC-CUS-012 Login\"]\r\n            UC13[\"UC-CUS-013 Logout\"]\r\n            UC14[\"UC-CUS-014 RefreshSession\"]\r\n            UC15[\"UC-CUS-015 GetSessionById\"]\r\n        end\r\n    end\r\n\r\n    CU --> UC01\r\n    CU --> UC04\r\n    CU --> UC07\r\n    CU --> UC08\r\n    CU --> UC09\r\n    CU --> UC10\r\n    CU --> UC11\r\n    CU --> UC12\r\n    CU --> UC13\r\n    CU --> UC14\r\n    CU --> UC15\r\n\r\n    OP --> UC02\r\n    OP --> UC03\r\n    OP --> UC05\r\n    OP --> UC06\r\n","isSeq":false},{"id":"diag-1","source":"classDiagram\r\n    class Customer {\r\n        +Uuid id\r\n        +Email email\r\n        +String firstName\r\n        +String lastName\r\n        +String phone\r\n        +CustomerStatus status\r\n        +DateTime createdAt\r\n        +DateTime updatedAt\r\n    }\r\n\r\n    class Address {\r\n        +Uuid id\r\n        +String label\r\n        +String street\r\n        +String district\r\n        +String city\r\n        +String postalCode\r\n        +Text notes\r\n        +Boolean isDefault\r\n    }\r\n\r\n    class Session {\r\n        +Uuid id\r\n        +Uuid customerId\r\n        +String token\r\n        +DateTime expiresAt\r\n        +SessionStatus status\r\n        +DateTime createdAt\r\n        +DateTime updatedAt\r\n    }\r\n\r\n    class CustomerStatus {\r\n        <<enumeration>>\r\n        ACTIVE\r\n        SUSPENDED\r\n    }\r\n\r\n    class SessionStatus {\r\n        <<enumeration>>\r\n        ACTIVE\r\n        REVOKED\r\n    }\r\n\r\n    Customer \"1\" *-- \"0..*\" Address : composition\r\n    Customer \"1\" --> \"0..*\" Session : association\r\n    Customer ..> CustomerStatus : status\r\n    Session ..> SessionStatus : status\r\n","isSeq":false},{"id":"diag-2","source":"stateDiagram-v2\r\n    [*] --> ACTIVE : UC-CUS-001 RegisterCustomer\r\n\r\n    ACTIVE --> SUSPENDED : UC-CUS-005 SuspendCustomer\r\n    SUSPENDED --> ACTIVE : UC-CUS-006 ReactivateCustomer\r\n\r\n    ACTIVE : ACTIVE Cuenta activa, puede iniciar sesion\r\n    SUSPENDED : SUSPENDED Cuenta suspendida, no puede iniciar sesion\r\n","isSeq":false},{"id":"diag-3","source":"stateDiagram-v2\r\n    [*] --> ACTIVE : UC-CUS-012 Login (creation)\r\n\r\n    ACTIVE --> REVOKED : UC-CUS-013 Logout\r\n\r\n    ACTIVE : ACTIVE Sesion valida, token utilizable\r\n    REVOKED : REVOKED Sesion invalida, token no aceptado (estado terminal)\r\n","isSeq":false}];
    mermaid.initialize({ theme: 'default' });

    const rendered = new Set();

    async function renderDiagram({ id, source }) {
      if (rendered.has(id)) return;
      rendered.add(id);
      const el = document.getElementById(id);
      if (!el) return;
      el.innerHTML = '<span class="loading-spinner">Rendering…</span>';
      try {
        const { svg } = await mermaid.render('svg-' + id, source);
        el.innerHTML = svg;
      } catch (err) {
        el.className = 'diag-error';
        el.innerHTML =
          '<div class="text-warning small mb-2 fw-semibold">&#9888; Diagram syntax error — raw source:</div>' +
          '<pre>' + source.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</pre>';
      }
    }

    // Render all diagrams in visible tab pane on load
    async function renderVisible() {
      for (const d of DIAGRAMS) {
        const el = document.getElementById(d.id);
        if (el && el.offsetParent !== null) await renderDiagram(d);
      }
    }

    // Re-render when a tab becomes active
    document.querySelectorAll('[data-bs-toggle="tab"]').forEach((btn) => {
      btn.addEventListener('shown.bs.tab', () => renderVisible());
    });

    window.addEventListener('load', renderVisible);
  </script>
</body>
</html>
